name: Bug report
description: Report incorrect behavior in the skill, scanner, site, or benchmark.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the observed behavior and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include commands, prompts, fixture paths, or minimal code.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain why this matters for production security review or hardening.
    validations:
      required: false
