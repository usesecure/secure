name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            site/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install site dependencies
        run: npm install
        working-directory: site

      - name: Check Python scripts
        run: python -m py_compile skills/secure/scripts/project_scraper.py skills/secure/scripts/inventory_scan.py

      - name: Run benchmark tests
        run: npm test
        working-directory: benchmark

      - name: Build site
        run: npm run build
        working-directory: site
