<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Secure review pack interface</title>
  <desc id="desc">A stylized security review dashboard with risk-ranked files, language coverage, and fix coverage.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="22" dy="26" stdDeviation="0" flood-color="#201b14" flood-opacity="0.25"/>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#2b241a" stroke-opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="1200" height="820" fill="#f3e5c5"/>
  <rect width="1200" height="820" fill="url(#grid)"/>
  <g filter="url(#shadow)">
    <rect x="118" y="88" width="920" height="604" fill="#fff2cf" stroke="#251d15" stroke-width="4"/>
    <rect x="118" y="88" width="920" height="72" fill="#f05a28" stroke="#251d15" stroke-width="4"/>
    <circle cx="154" cy="124" r="10" fill="#251d15"/>
    <circle cx="188" cy="124" r="10" fill="#251d15"/>
    <circle cx="222" cy="124" r="10" fill="#251d15"/>
    <text x="270" y="132" font-family="JetBrains Mono, Consolas, monospace" font-size="24" font-weight="700" fill="#251d15">$secure C:\project</text>

    <rect x="154" y="196" width="328" height="436" fill="#28385f" stroke="#251d15" stroke-width="3"/>
    <text x="184" y="238" font-family="Arial Narrow, Arial, sans-serif" font-size="42" font-weight="800" fill="#fff2cf">Review Pack</text>
    <text x="184" y="278" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#9ff0a6">FILES SCANNED  12,480</text>
    <text x="184" y="306" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#9ff0a6">TOP ROUTES     86</text>
    <text x="184" y="334" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#9ff0a6">SECRETS        REDACTED</text>

    <rect x="184" y="382" width="238" height="34" fill="#9ff0a6" stroke="#251d15" stroke-width="2"/>
    <rect x="184" y="432" width="192" height="34" fill="#f05a28" stroke="#251d15" stroke-width="2"/>
    <rect x="184" y="482" width="262" height="34" fill="#fff2cf" stroke="#251d15" stroke-width="2"/>
    <rect x="184" y="532" width="144" height="34" fill="#9ff0a6" stroke="#251d15" stroke-width="2"/>
    <text x="184" y="602" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#fff2cf">scan -> confirm -> patch -> verify</text>

    <g font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#251d15">
      <text x="534" y="214">Highest-signal files</text>
      <text x="534" y="278">01  publish-entry.ts     mass assignment x11</text>
      <text x="534" y="326">02  permissions.cs       tenant scope x8</text>
      <text x="534" y="374">03  StorageController    signed URL x4</text>
      <text x="534" y="422">04  webhook.py           public write x6</text>
      <text x="534" y="470">05  routes.php           missing policy x5</text>
    </g>

    <g fill="none" stroke="#251d15" stroke-width="3">
      <path d="M534 244H982"/>
      <path d="M534 292H982"/>
      <path d="M534 340H982"/>
      <path d="M534 388H982"/>
      <path d="M534 436H982"/>
      <path d="M534 484H982"/>
    </g>

    <rect x="534" y="538" width="412" height="82" fill="#9ff0a6" stroke="#251d15" stroke-width="3"/>
    <text x="562" y="574" font-family="Arial Narrow, Arial, sans-serif" font-size="30" font-weight="800" fill="#251d15">Fix coverage</text>
    <text x="780" y="578" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="700" fill="#251d15">8/8 HIGH</text>
  </g>
</svg>
